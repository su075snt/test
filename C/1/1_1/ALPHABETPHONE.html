<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ABC Alphabet Only</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fffaf0;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            -webkit-text-size-adjust: 100%;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; max-width: 350px;
        }
        .card {
            background: white; border-radius: 25px;
            padding: 25px 5px; display: flex; flex-direction: column; align-items: center;
            border: 4px solid #ffcad4; box-shadow: 0 6px 0 #ffcad4;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .card:active { transform: translateY(4px); box-shadow: 0 1px 0 #ffcad4; }
        .letter { font-size: 60px; color: #ff758f; line-height: 1; margin-bottom: 10px; }
        .emoji { font-size: 40px; margin-bottom: 10px; }
        .word { font-size: 16px; font-weight: bold; color: #4ea8de; text-transform: uppercase; letter-spacing: 1px; }
        
        .card:nth-child(4n+1) { border-color: #ffcfd2; box-shadow: 0 6px 0 #ffcfd2; }
        .card:nth-child(4n+2) { border-color: #b9fbc0; box-shadow: 0 6px 0 #b9fbc0; }
        .card:nth-child(4n+3) { border-color: #cfbcff; box-shadow: 0 6px 0 #cfbcff; }
        .card:nth-child(4n+4) { border-color: #a3c4f3; box-shadow: 0 6px 0 #a3c4f3; }
    </style>
</head>
<body>

    <h2 style="color: #ff85a1; font-size: 24px; margin-bottom: 20px;">✨ ENGLISH ABC ✨</h2>
    <div class="grid" id="alphabet-grid"></div>

    <script>
        const alphabet = [
            {l: 'A', e: '🍎', w: 'Apple'}, {l: 'B', e: '⚽', w: 'Ball'}, {l: 'C', e: '🐱', w: 'Cat'},
            {l: 'D', e: '🐶', w: 'Dog'}, {l: 'E', e: '🐘', w: 'Elephant'}, {l: 'F', e: '🐟', w: 'Fish'},
            {l: 'G', e: '🦒', w: 'Giraffe'}, {l: 'H', e: '👒', w: 'Hat'}, {l: 'I', e: '🍦', w: 'Ice cream'},
            {l: 'J', e: '🪼', w: 'Jellyfish'}, {l: 'K', e: '🦘', w: 'Kangaroo'}, {l: 'L', e: '🦁', w: 'Lion'},
            {l: 'M', e: '🐒', w: 'Monkey'}, {l: 'N', e: '👩‍⚕️', w: 'Nurse'}, {l: 'O', e: '🐙', w: 'Octopus'},
            {l: 'P', e: '🐼', w: 'Panda'}, {l: 'Q', e: '👸', w: 'Queen'}, {l: 'R', e: '🐰', w: 'Rabbit'},
            {l: 'S', e: '☀️', w: 'Sun'}, {l: 'T', e: '🐯', w: 'Tiger'}, {l: 'U', e: '☂️', w: 'Umbrella'},
            {l: 'V', e: '🚐', w: 'Van'}, {l: 'W', e: '🐳', w: 'Whale'}, {l: 'X', e: '🎹', w: 'Xylophone'},
            {l: 'Y', e: '🪀', w: 'Yo-yo'}, {l: 'Z', e: '🦓', w: 'Zebra'}
        ];

        function playOnlyLetter(char) {
            window.speechSynthesis.cancel(); // Tắt âm cũ ngay lập tức

            const utterance = new SpeechSynthesisUtterance(char);
            utterance.lang = 'en-US';
            utterance.rate = 0.7;  // Tốc độ chậm rõ ràng
            utterance.pitch = 1.2; // Giọng nữ cao dễ thương

            // Tìm giọng nữ chuẩn iPhone (Samantha)
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => 
                (v.name.includes('Samantha') || v.name.includes('Apple') || v.name.includes('Female')) 
                && v.lang.includes('en')
            );
            
            if (femaleVoice) utterance.voice = femaleVoice;

            window.speechSynthesis.speak(utterance);
        }

        const container = document.getElementById('alphabet-grid');
        alphabet.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="letter">${item.l}</div>
                <div class="emoji">${item.e}</div>
                <div class="word">${item.w}</div>
            `;
            // CHỈ truyền chữ cái (item.l) vào hàm đọc
            card.onclick = () => playOnlyLetter(item.l);
            container.appendChild(card);
        });

        // Kích hoạt nạp giọng nói cho Safari/iPhone
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
