<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ひらがな おけいこ</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #ff9a9e; --bg: #fffaf0; --accent: #ffde7d; --correct: #c8e6c9; --wrong: #ffcdd2; }
        body {
            font-family: 'Kosugi Maru', sans-serif; background-color: var(--bg);
            margin: 0; display: flex; flex-direction: column; align-items: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
  .btn-toggle {
            top: 15px;
            right: 15px;
            top: calc(15px + env(safe-area-inset-top));
        }

        header {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            width: 100%; padding: 15px 0; text-align: center;
            color: white; font-size: 22px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .tab-container { display: flex; margin: 15px 0; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .tab {
            padding: 10px 15px; cursor: pointer; background: white;
            border: 2px solid var(--primary); border-radius: 20px; font-size: 14px; font-weight: bold;
        }
        .tab.active { background: var(--primary); color: white; }
        
        #game-container {
            width: 90%; max-width: 500px; background: white; min-height: 450px;
            padding: 20px; border-radius: 30px; border: 5px solid var(--accent);
            text-align: center; position: relative; display: flex; flex-direction: column;
        }
        .progress-bar { font-size: 18px; color: #ff6f61; margin-bottom: 10px; font-weight: bold; background: #fff5f5; padding: 5px; border-radius: 10px; }
        
        .audio-box {
            font-size: 80px; width: 120px; height: 120px; background: #fff5f5;
            border-radius: 50%; border: 4px dashed var(--primary);
            display: inline-flex; align-items: center; justify-content: center;
            margin: 10px auto 20px; cursor: pointer; animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-btn {
            padding: 15px 5px; background: white; border: 3px solid #eee;
            border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s;
        }
        .option-btn .char { font-size: 32px; color: #ff6f61; font-weight: bold; }
        .option-btn .emoji { font-size: 24px; }
        .option-btn .word { font-size: 13px; color: #777; font-weight: bold;}
        
        .option-btn.correct { background: var(--correct) !important; border-color: #4caf50; }
        .option-btn.wrong { background: var(--wrong) !important; border-color: #f44336; }

        #result-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; border-radius: 25px; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        .btn-restart {
            margin-top: 20px; padding: 12px 30px; background: #ff6f61;
            color: white; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; font-family: 'Kosugi Maru';
        }
        .message { margin-top: 15px; font-size: 18px; font-weight: bold; color: #ff4081; min-height: 25px; }
    </style>
</head>
<body>

<header>🌸 ひらがな おけいこ 🌸</header>

<div class="tab-container">
    <div class="tab active" onclick="initGame('seion', this)">せいおん (46)</div>
    <div class="tab" onclick="initGame('dakuon', this)">だくおん (25)</div>
    <div class="tab" onclick="initGame('yoon', this)">ようおん (33)</div>
</div>

<div id="game-container">
    <div id="result-screen">
        <div style="font-size: 80px;">🏆</div>
        <h2 id="result-title">よくできました！</h2>
        <p id="result-msg">Bạn đã thuộc hết bảng này rồi!</p>
        <button class="btn-restart" onclick="location.reload()">もういちど (Làm lại)</button>
    </div>

    <div class="progress-bar">のこり (Còn lại): <span id="count">0</span> / <span id="total">0</span></div>
    <div class="audio-box" onclick="playCurrent()">📢</div>
    <div id="options" class="options-grid"></div>
    <div class="message" id="message"></div>
</div>

<script>
    const database = {
        seion: [
            {c:"あ",e:"🐜",w:"あり"},{c:"い",e:"🍓",w:"いちご"},{c:"う",e:"🐰",w:"うさぎ"},{c:"え",e:"✏️",w:"えんぴつ"},{c:"お",e:"👹",w:"おに"},
            {c:"か",e:"🐢",w:"かめ"},{c:"き",e:"🍄",w:"きのこ"},{c:"く",e:"🐻",w:"くま"},{c:"け",e:"🐛",w:"けむし"},{c:"こ",e:"🎪",w:"こま"},
            {c:"さ",e:"🐟",w:"さかな"},{c:"し",e:"🦌",w:"しか"},{c:"す",e:"🍉",w:"すいか"},{c:"せ",e:"🧼",w:"せっけん"},{c:"そ",e:"🍦",w:"そふと"},
            {c:"た",e:"🐙",w:"たこ"},{c:"ち",e:"🌷",w:"ちゅーりっぷ"},{c:"つ",e:"🌙",w:"つき"},{c:"て",e:"💌",w:"てがみ"},{c:"と",e:"🐯",w:"とら"},
            {c:"な",e:"🍆",w:"なす"},{c:"に",e:"🥕",w:"にんじん"},{c:"ぬ",e:"🐕",w:"いぬ"},{c:"ね",e:"🐱",w:"ねこ"},{c:"の",e:"📓",w:"のーと"},
            {c:"は",e:"🌸",w:"はな"},{c:"ひ",e:"🐑",w:"ひつじ"},{c:"ふ",e:"🚢",w:"ふね"},{c:"へ",e:"🐍",w:"へび"},{c:"ほ",e:"⭐",w:"ほし"},
            {c:"ま",e:"🫘",w:"まめ"},{c:"み",e:"🍊",w:"みかん"},{c:"む",e:"🐞",w:"むし"},{c:"め",e:"👓",w:"めがね"},{c:"も",e:"🍑",w:"もも"},
            {c:"や",e:"⛰️",w:"やま"},{c:"ゆ",e:"❄️",w:"ゆき"},{c:"よ",e:"⛵",w:"よっと"},
            {c:"ら",e:"🦁",w:"らいおん"},{c:"り",e:"🍎",w:"りんご"},{c:"る",e:"🐒",w:"さる"},{c:"れ",e:"🍋",w:"れもん"},{c:"ろ",e:"🚀",w:"ろけっと"},
            {c:"わ",e:"🐊",w:"わに"},{c:"を",e:"📻",w:"らじおをきく"},{c:"ん",e:"🔔",w:"りん"}
        ],
        dakuon: [
            {c:"が",e:"🦆",w:"がちょう"},{c:"ぎ",e:"🎸",w:"ぎたー"},{c:"ぐ",e:"🍇",w:"ぐれーぷ"},{c:"げ",e:"👞",w:"げた"},{c:"ご",e:"🦍",w:"ごりら"},
            {c:"ざ",e:"🐘",w:"ぞう"},{c:"じ",e:"⛑️",w:"じしん"},{c:"ず",e:"🗺️",w:"ちず"},{c:"ぜ",e:" jelly",w:"ぜりー"},{c:"ぞ",e:"🧹",w:"ぞうきん"},
            {c:"だ",e:"🥁",w:"たいこ"},{c:"ぢ",e:"鼻血",w:"はなぢ"},{c:"づ",e:"👃",w:"はなみづ"},{c:"で",e:"📞",w:"でんわ"},{c:"ど",e:"🍩",w:"どーなつ"},
            {c:"ば",e:"🍌",w:"ばなな"},{c:"び",e:"🐍",w:"へび"},{c:"ぶ",e:"🐷",w:"ぶた"},{c:"べ",e:"🍱",w:"べんとう"},{c:"ぼ",e:"⚽",w:"ぼーる"},
            {c:"ぱ",e:"🐼",w:"ぱんだ"},{c:"ぴ",e:"🐥",w:"ぴよぴよ"},{c:"ぷ",e:"🍮",w:"ぷりん"},{c:"ぺ",e:"🐧",w:"ぺんぎん"},{c:"ぽ",e:"📮",w:"ぽすと"}
        ],
        yoon: [
            {c:"きゃ",e:"🐱",w:"きゃく"},{c:"きゅ",e:"🥒",w:"きゅうり"},{c:"きょ",e:"🦈",w:"きょりゅう"},
            {c:"しゃ",e:"🚗",w:"しゃしん"},{c:"しゅ",e:"🧤",w:"しゅぎょう"},{c:"しょ",e:"🚒",w:"しょうぼうしゃ"},
            {c:"ちゃ",e:"🍵",w:"おちゃ"},{c:"ちゅ",e:"🐭",w:"ちゅう"},{c:"ちょ",e:"🍫",w:"ちょこれーと"},
            {c:"にゃ",e:"😸",w:"にゃんこ"},{c:"にゅ",e:"🥛",w:"にゅうにゅう"},{c:"にょ",e:"🐍",w:"にょろにょろ"},
            {c:"ひゃ",e:"❄️",w:"ひゃく"},{c:"ひゅ",e:"🌬️",w:"ひゅう"},{c:"ひょ",e:"🐆",w:"ひょう"},
            {c:"みゃ",e:"🐾",w:"みゃあ"},{c:"みゅ",e:"🎶",w:"みゅーじっく"},{c:"みょ",e:"Ginger",w:"みょうが"},
            {c:"りゃ",e:"🦖",w:"りゃく"},{c:"りゅ",e:"🐉",w:"りゅう"},{c:"りょ",e:"🍵",w:"りょくちゃ"},
            {c:"ぎゃ",e:"🖼️",w:"ぎゃらりー"},{c:"ぎゅ",e:"🥩",w:"ぎゅうにく"},{c:"ぎょ",e:"🐟",w:"ぎょかい"},
            {c:"じゃ",e:"🥔",w:"じゃがいも"},{c:"じゅ",e:"🥤",w:"じゅーす"},{c:"じょ",e:"👸",w:"じょおう"},
            {c:"びゃ",e:"💯",w:"びゃっこ"},{c:"びゅ",e:"",w:"びゅー"},{c:"びょ",e:"🏥",w:"びょういん"},
            {c:"ぴゃ",e:"八〇〇",w:"はっぴゃく"},{c:"ぴゅ",e:"",w:"ぴゅあ"},{c:"ぴょ",e:"🐰",w:"ぴょんぴょん"}
        ]
    };
	const encouragements = [
    "ざんねん！あとで また やろう",
    "おしい！つぎは がんばろう",
    "どんまい！もういちど トライだ",
    "だいじょうぶ！つぎは できるよ",
    "おっと！もう一回 れんしゅうだね"
];

    const praises = ["すごい！", "てんさいだね！", "やったー！", "ばっちり！", "おみごと！"];
    let queue = [];
    let currentQ = null;
    let allInTab = [];
    let isProcessing = false;

    function initGame(tab, el) {
        if(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        allInTab = [...database[tab]];
        queue = [...allInTab].sort(() => Math.random() - 0.5);
        document.getElementById('total').innerText = allInTab.length;
        document.getElementById('result-screen').style.display = 'none';
        nextQuestion();
    }

    function playCurrent() { if(currentQ) speak(currentQ.c); }

    function speak(text) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }

    function nextQuestion() {
        if (queue.length === 0) {
            showResult();
            return;
        }

        isProcessing = false;
        currentQ = queue[0];
        document.getElementById('count').innerText = queue.length;
        document.getElementById('message').innerText = "";
        
        let choices = [currentQ];
        let others = allInTab.filter(item => item.c !== currentQ.c);
        others.sort(() => Math.random() - 0.5);
        choices.push(...others.slice(0, 3));
        choices.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('options');
        grid.innerHTML = "";
        choices.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="char">${opt.c}</span><span class="emoji">${opt.e}</span><span class="word">${opt.w}</span>`;
            btn.onclick = () => check(opt, btn);
            grid.appendChild(btn);
        });

        setTimeout(playCurrent, 500);
    }
function check(selected, btn) {
    if(isProcessing) return;
    isProcessing = true;

    if(selected.c === currentQ.c) {
        btn.classList.add('correct');
        queue.shift(); 
        const p = praises[Math.floor(Math.random() * praises.length)];
        document.getElementById('message').innerText = p;
        speak(p);
        setTimeout(nextQuestion, 1500);
    } else {
        btn.classList.add('wrong');
        
        // 2. Lấy ngẫu nhiên 1 trong 5 câu khuyến khích
        const e = encouragements[Math.floor(Math.random() * encouragements.length)];
        
        // 3. Hiển thị và đọc câu ngẫu nhiên đó
        document.getElementById('message').innerText = e;
        speak(e); // Đọc nội dung thông báo thay vì chỉ đọc "ざんねん"
        
        // Đưa câu sai xuống cuối hàng đợi
        const failed = queue.shift();
        queue.push(failed);
        
        setTimeout(nextQuestion, 1500);
    }
}

    function showResult() {
        document.getElementById('result-screen').style.display = 'flex';
        speak("おめでとう！ぜんぶんせいかいです");
    }

    window.onload = () => initGame('seion');
</script>

</body>
</html>
