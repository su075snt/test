<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kanji">
    <title>Kanji (Tập viết)</title>
    <style>
        :root {
            --danger: #d63031;
            --bg: #ffffff;
            --header-bg: #f8f9fa;
            --primary: #2d3436;
            --border: #ddd;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ---- HOME SCREEN ---- */
        #home-screen {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .home-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 0 6px 0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
            padding-top: max(12px, env(safe-area-inset-top));
        }
        .home-header h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--primary);
        }

        /* ---- SEARCH BAR ---- */
        .search-wrap {
            position: relative;
            width: 100%;
        }
        .search-wrap input {
            width: 100%;
            padding: 12px 44px 12px 18px;
            font-size: 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            outline: none;
            background: #fafafa;
            transition: border-color 0.25s, box-shadow 0.25s;
            color: var(--primary);
            -webkit-appearance: none;
            appearance: none;
        }
        .search-wrap input:focus {
            border-color: #666;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.04);
            background: white;
        }
        .search-wrap input::placeholder {
            color: #aaa;
            font-weight: 400;
        }
        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            color: #bbb;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 50%;
            display: none;
            transition: color 0.2s;
        }
        .search-clear:active {
            color: #555;
        }
        .search-clear.visible {
            display: block;
        }

        .search-stats {
            font-size: 13px;
            color: #888;
            text-align: center;
            padding: 2px 0 4px 0;
            min-height: 24px;
        }
        .search-stats em {
            font-style: normal;
            font-weight: 600;
            color: var(--primary);
        }

        /* ---- GRID ---- */
        .grid-kanji {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 12px;
            padding: 8px 0 50px 0;
            flex: 1;
            align-content: start;
        }

        .card-kanji {
            aspect-ratio: 1/1;
            border: 1.5px solid #333;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            background: white;
            transition: 0.15s;
            padding: 4px;
            line-height: 1.2;
            text-align: center;
            position: relative;
            user-select: none;
            -webkit-touch-callout: none;
        }
        .card-kanji:active {
            background: #f0f0f0;
            transform: scale(0.96);
        }
        .card-kanji .reading-sm {
            font-size: 10px;
            font-weight: 400;
            color: #666;
            margin-top: 1px;
            letter-spacing: 0.3px;
            line-height: 1.2;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-kanji .kanji-only {
            font-size: clamp(26px, 7vw, 34px);
            font-weight: 600;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 16px;
            font-weight: 500;
        }
        .no-results span {
            display: block;
            font-size: 40px;
            margin-bottom: 12px;
        }

        /* ---- LEARN SCREEN ---- */
        #learn-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: white;
            display: none;
            flex-direction: column;
            z-index: 100;
        }

        .nav-top {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            background: var(--header-bg);
            padding-top: max(10px, env(safe-area-inset-top));
            padding-left: max(15px, env(safe-area-inset-left));
            padding-right: max(15px, env(safe-area-inset-right));
            flex-shrink: 0;
        }

        .nav-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-nav {
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            background: #eee;
            color: #333;
            transition: opacity 0.2s;
            white-space: nowrap;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }
        .btn-nav:active {
            opacity: 0.7;
        }
        .btn-back {
            background: #e0e0e0;
        }
        .btn-clear {
            background: var(--danger);
            color: white;
        }
        .btn-prev-next {
            background: #ffffff;
            border: 1px solid #aaa;
        }
        #current-title {
            font-size: 18px;
            margin: 0 5px;
            text-align: center;
            flex: 0 1 auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 40%;
        }

        .main-view {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 0;
        }
        .main-view .box:first-child {
            flex: 2;
        }
        .main-view .box:last-child {
            flex: 3;
        }
        .box {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
            min-height: 0;
            min-width: 0;
        }

        #kanji-gif {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 12px;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            display: block;
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px),
                linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
            background-size: 20% 20%;
            -webkit-touch-callout: none;
        }
        #trace-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(0, 0, 0, 0.05);
            pointer-events: none;
            white-space: nowrap;
            line-height: 1;
            /* Fallback cho mọi trình duyệt */
            font-size: min(70vmin, 70vmax);
            /* Dùng vmin/vmax thay vì container query */
        }

        @media (max-aspect-ratio: 1/1) {
            .main-view {
                flex-direction: column;
            }
            .main-view .box:first-child {
                flex: 2;
            }
            .main-view .box:last-child {
                flex: 3;
            }
            .box {
                padding: 0;
            }
        }

        /* ---- RESPONSIVE TWEAKS ---- */
        @media (max-width: 480px) {
            .grid-kanji {
                grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
                gap: 10px;
            }
            .card-kanji .kanji-only {
                font-size: clamp(20px, 6vw, 28px);
            }
            .card-kanji {
                border-radius: 10px;
            }
            .card-kanji .reading-sm {
                font-size: 9px;
            }
            .search-wrap input {
                font-size: 15px;
                padding: 10px 40px 10px 14px;
            }
            .home-header h2 {
                font-size: 19px;
            }
            #current-title {
                font-size: 15px;
                max-width: 30%;
            }
            .btn-nav {
                font-size: 13px;
                padding: 6px 10px;
            }
        }

        @media (max-width: 380px) {
            .grid-kanji {
                grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
                gap: 8px;
            }
            .card-kanji .kanji-only {
                font-size: clamp(16px, 5vw, 22px);
            }
            .card-kanji {
                border-radius: 8px;
            }
            .card-kanji .reading-sm {
                font-size: 7px;
            }
        }

        /* Hỗ trợ iPad màn hình lớn */
        @media (min-width: 768px) and (max-width: 1024px) {
            .grid-kanji {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 16px;
            }
            .card-kanji .kanji-only {
                font-size: clamp(32px, 5vw, 40px);
            }
        }
    </style>
</head>
<body>

    <!-- ===== HOME SCREEN ===== -->
    <div id="home-screen">
        <div class="home-header">
            <h2>📖 Kanji</h2>
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="🔍 Tìm theo âm đọc (かた) hoặc chữ Hán (形)" autocomplete="off" spellcheck="false">
                <button class="search-clear" id="searchClear" aria-label="Xóa tìm kiếm">✕</button>
            </div>
            <div class="search-stats" id="searchStats"></div>
        </div>
        <div class="grid-kanji" id="kanjiGrid"></div>
    </div>

    <!-- ===== LEARN SCREEN ===== -->
    <div id="learn-screen">
        <div class="nav-top">
            <div class="nav-group">
                <button class="btn-nav btn-back" onclick="goHome()">← 戻る</button>
                <button class="btn-nav btn-prev-next" onclick="prevKanji()">← 前</button>
            </div>
            <h2 id="current-title"></h2>
            <div class="nav-group">
                <button class="btn-nav btn-prev-next" onclick="nextKanji()">次 →</button>
                <button class="btn-nav btn-clear" onclick="clearBoard()">消す</button>
            </div>
        </div>

        <div class="main-view">
            <div class="box">
                <img id="kanji-gif" src="" alt="GIF" onerror="this.style.display='none'">
            </div>
            <div class="box">
                <div class="canvas-container">
                    <div id="trace-text"></div>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

                "魚": "さかな",
                "教": "おしえる",
                "強": "つよい",
                "黄": "き",
                "黒": "くろ",
                "細": "ほそい",
                "週": "しゅう",
                "雪": "ゆき",
                "船": "ふね",
                "組": "くむ",
                "鳥": "とり",
                "野": "の",
                "理": "ことわり",
                "雲": "くも",
                "絵": "え",
                "間": "あいだ",
                "場": "ば",
                "晴": "はれる",
                "朝": "あさ",
                "答": "こたえる",
                "道": "みち",
                "買": "かう",
                "番": "ばん",
                "遠": "とおい",
                "園": "その",
                "楽": "たのしい",
                "新": "あたらしい",
                "数": "かず",
                "電": "でん",
                "話": "はなす",
                "歌": "うた",
                "語": "かたる",
                "算": "さん",
                "読": "よむ",
                "聞": "きく",
                "鳴": "なく",
                "線": "せん",
                "親": "おや",
                "頭": "あたま",
                "顔": "かお",
                "曜": "よう"
            };

            const strokeCounts = {};
            rawKanjiList.forEach(k => { strokeCounts[k] = 1; });

            const kanjiData = [...rawKanjiList];

            // ============================================================
            //  DOM REFERENCES
            // ============================================================
            let canvas, ctx, gif, trace, title, home, learn, grid, searchInput, searchClear, searchStats;

            let drawing = false;
            let currentIndex = 0;
            let currentFilter = '';

            // ============================================================
            //  INIT
            // ============================================================
            function init() {
                home = document.getElementById('home-screen');
                learn = document.getElementById('learn-screen');
                canvas = document.getElementById('canvas');
                ctx = canvas.getContext('2d');
                gif = document.getElementById('kanji-gif');
                trace = document.getElementById('trace-text');
                title = document.getElementById('current-title');
                grid = document.getElementById('kanjiGrid');
                searchInput = document.getElementById('searchInput');
                searchClear = document.getElementById('searchClear');
                searchStats = document.getElementById('searchStats');

                // Render grid lần đầu
                renderGrid();

                // --- Canvas events ---
                canvas.addEventListener('mousedown', startDrawing);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDrawing);
                canvas.addEventListener('mouseleave', stopDrawing);
                canvas.addEventListener('touchstart', startDrawing, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', stopDrawing);
                canvas.addEventListener('touchcancel', stopDrawing);

                window.addEventListener('resize', function() {
                    requestAnimationFrame(resizeCanvas);
                });
                window.addEventListener('orientationchange', function() {
                    setTimeout(function() { requestAnimationFrame(resizeCanvas); }, 200);
                });

                // --- Search events ---
                searchInput.addEventListener('input', onSearchInput);
                searchClear.addEventListener('click', clearSearch);

                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') {
                        clearSearch();
                        searchInput.blur();
                    }
                });

                // Khởi tạo canvas sau khi layout hoàn tất
                setTimeout(resizeCanvas, 300);
            }

            // ============================================================
            //  SEARCH
            // ============================================================
            function onSearchInput() {
                const q = searchInput.value;
                currentFilter = q;
                searchClear.classList.toggle('visible', q.length > 0);
                renderGrid();
            }

            function clearSearch() {
                searchInput.value = '';
                currentFilter = '';
                searchClear.classList.remove('visible');
                renderGrid();
                searchInput.focus();
            }

            function filterKanji(query) {
                const trimmed = query.trim();
                if (!trimmed) return kanjiData;

                const q = trimmed.toLowerCase();
                const hasKanji = /[\u4e00-\u9faf]/.test(q);

                const results = [];
                for (const k of kanjiData) {
                    const reading = (readings[k] || '').toLowerCase();
                    const matchKanji = k.includes(q);
                    const matchReading = reading.includes(q);
                    if (hasKanji) {
                        if (matchKanji) results.push(k);
                    } else {
                        if (matchKanji || matchReading) results.push(k);
                    }
                }
                return results;
            }

            // ============================================================
            //  RENDER GRID
            // ============================================================
            function renderGrid() {
                const filtered = filterKanji(currentFilter);
                const total = kanjiData.length;
                const found = filtered.length;

                if (currentFilter.trim()) {
                    searchStats.innerHTML = '🔍 Tìm thấy <em>' + found + '</em> / ' + total + ' Kanji';
                } else {
                    searchStats.innerHTML = 'Tổng số <em>' + total + '</em> Kanji';
                }

                grid.innerHTML = '';

                if (found === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'no-results';
                    empty.innerHTML = '<span>🔎</span> Không tìm thấy Kanji nào cho “‘' + currentFilter.trim() + '”';
                    grid.appendChild(empty);
                    return;
                }

                const isSearching = currentFilter.trim().length > 0;

                for (const k of filtered) {
                    const card = document.createElement('div');
                    card.className = 'card-kanji';
                    card.dataset.kanji = k;

                    const kanjiSpan = document.createElement('span');
                    kanjiSpan.className = 'kanji-only';
                    kanjiSpan.textContent = k;
                    card.appendChild(kanjiSpan);

                    if (isSearching) {
                        const reading = readings[k] || '';
                        if (reading) {
                            const readingSpan = document.createElement('span');
                            readingSpan.className = 'reading-sm';
                            readingSpan.textContent = reading;
                            card.appendChild(readingSpan);
                        }
                    }

                    card.onclick = (function(kanji) {
                        return function() { startLearn(kanji); };
                    })(k);

                    grid.appendChild(card);
                }
            }

            // ============================================================
            //  LEARN SCREEN
            // ============================================================
            function updateLearnScreen(k) {
                const reading = readings[k] || '';
                title.innerText = k + (reading ? '（' + reading + '）' : '');
                trace.innerText = k;
                gif.src = k + '-order.gif';
                gif.style.display = '';
                clearBoard();
                requestAnimationFrame(function() {
                    setTimeout(resizeCanvas, 50);
                });
            }

            function startLearn(k) {
                home.style.display = 'none';
                learn.style.display = 'flex';
                currentIndex = kanjiData.indexOf(k);
                if (currentIndex === -1) currentIndex = 0;
                updateLearnScreen(k);
            }

            window.prevKanji = function() {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateLearnScreen(kanjiData[currentIndex]);
                }
            };

            window.nextKanji = function() {
                if (currentIndex < kanjiData.length - 1) {
                    currentIndex++;
                    updateLearnScreen(kanjiData[currentIndex]);
                }
            };

            window.goHome = function() {
                home.style.display = 'flex';
                learn.style.display = 'none';
                gif.src = '';
            };

            window.clearBoard = function() {
                if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
            };

            // ============================================================
            //  CANVAS
            // ============================================================
            function resizeCanvas() {
                if (!canvas || !canvas.parentElement) return;
                const container = canvas.parentElement;
                const w = container.clientWidth;
                const h = container.clientHeight;
                if (w > 0 && h > 0) {
                    canvas.width = w;
                    canvas.height = h;
                    clearBoard();
                }
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return {
                    x: Math.min(Math.max((clientX - rect.left) * scaleX, 0), canvas.width),
                    y: Math.min(Math.max((clientY - rect.top) * scaleY, 0), canvas.height)
                };
            }

            function startDrawing(e) {
                if (e.preventDefault) e.preventDefault();
                drawing = true;
                ctx.beginPath();
                draw(e);
            }

            function stopDrawing() {
                drawing = false;
                ctx.beginPath();
            }

            function draw(e) {
                if (!drawing) return;
                if (e.preventDefault) e.preventDefault();
                const p = getPos(e);
                ctx.lineWidth = Math.max(8, canvas.width / 40);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#2d3436';
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
            }

            // ============================================================
            //  START
            // ============================================================
            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>
</html>
