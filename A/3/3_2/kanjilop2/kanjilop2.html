<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kanji N4-N3">
    <title>Kanji N4-N3</title>
    <style>
        :root { --danger: #d63031; --bg: #ffffff; --header-bg: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
        }

        #home-screen { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px; 
            overflow-y: auto; 
        }
        .grid-kanji { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); 
            gap: 12px; 
            padding: 20px 0 50px 0;
        }
        .card-kanji { 
            aspect-ratio: 1/1; 
            border: 1.5px solid #333; 
            border-radius: 12px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 7vw; 
            font-weight: 600; 
            cursor: pointer;
            background: white; 
            transition: 0.2s;
        }
        @media (min-width: 400px) {
            .card-kanji { font-size: 28px; }
        }
        @media (max-width: 300px) {
            .card-kanji { font-size: 20px; }
        }
        .card-kanji:active { background: #f0f0f0; }

        #learn-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: white; 
            display: none; 
            flex-direction: column; 
            z-index: 100;
        }

        .nav-top { 
            padding: 10px 15px; 
            border-bottom: 1px solid #eee; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            background: var(--header-bg);
            padding-top: max(10px, env(safe-area-inset-top)); 
            padding-left: max(15px, env(safe-area-inset-left));
            padding-right: max(15px, env(safe-area-inset-right));
        }

        .nav-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-nav { 
            padding: 8px 12px; 
            border: none; 
            border-radius: 10px; 
            font-weight: 600; 
            font-size: 15px; 
            cursor: pointer; 
            background: #eee; 
            color: #333;
            transition: opacity 0.2s; 
            white-space: nowrap;
        }
        .btn-nav:active { opacity: 0.7; }
        .btn-back { background: #e0e0e0; }
        .btn-clear { background: var(--danger); color: white; }
        .btn-prev-next {
            background: #ffffff;
            border: 1px solid #aaa;
        }
        #current-title {
            font-size: 18px;
            margin: 0 5px;
            text-align: center;
            flex: 0 1 auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 40%;
        }

        .main-view { 
            flex: 1; 
            display: flex; 
            flex-direction: row; 
            overflow: hidden;
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .main-view .box:first-child { flex: 2; }   /* 40% */
        .main-view .box:last-child { flex: 3; }    /* 60% */
        .box { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0; 
            position: relative; 
        }
        
        #kanji-gif { 
            max-width: 80%; 
            max-height: 80%; 
            object-fit: contain; 
            border-radius: 12px; 
        }

        .canvas-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            border: none; 
            background: white; 
            container-type: size;
        }
        canvas { 
            width: 100%; 
            height: 100%; 
            touch-action: none; 
            display: block;
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px), 
                              linear-gradient(90deg, #f0f0f0 1px, transparent 1px); 
            background-size: 20% 20%;
        }
        #trace-text { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: rgba(0,0,0,0.05); 
            pointer-events: none; 
            white-space: nowrap; 
            line-height: 1;
            font-size: 40vw;
        }
        @container (min-width: 1px) {
            #trace-text { font-size: min(70cqi, 70cqh); }
        }

        @media (max-aspect-ratio: 1/1) {
            .main-view { flex-direction: column; }
            .main-view .box:first-child { flex: 2; }
            .main-view .box:last-child { flex: 3; }
            .box { padding: 0; }
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <h2 style="text-align: center; padding: 20px 0 10px;">N4-N3　１６０漢字</h2>
        <div class="grid-kanji" id="kanjiGrid"></div>
    </div>

    <div id="learn-screen">
        <div class="nav-top">
            <div class="nav-group">
                <button class="btn-nav btn-back" onclick="goHome()">←戻る</button>
                <button class="btn-nav btn-prev-next" onclick="prevKanji()">←前</button>
            </div>

            <h2 id="current-title">一</h2>

            <div class="nav-group">
                <button class="btn-nav btn-prev-next" onclick="nextKanji()">次→</button>
                <button class="btn-nav btn-clear" onclick="clearBoard()">消す</button>
            </div>
        </div>

        <div class="main-view">
            <div class="box">
                <img id="kanji-gif" src="" alt="GIF" onerror="this.style.display='none'">
            </div>
            <div class="box">
                <div class="canvas-container">
                    <div id="trace-text"></div>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // --- DANH SÁCH KANJI (160 chữ) ---
            var rawKanjiList = [
                "刀", "丸", "弓", "工", "才", "万", "引", "牛", "今", "元",
                "戸", "午", "公", "止", "少", "心", "切", "太", "内", "父",
                "分", "方", "毛", "友", "外", "兄", "古", "広", "矢", "市",
                "台", "冬", "半", "母", "北", "用", "羽", "会", "回", "交",
                "光", "考", "行", "合", "寺", "自", "色", "西", "多", "池",
                "地", "当", "同", "肉", "米", "毎", "何", "角", "汽", "近",
                "形", "言", "谷", "作", "社", "図", "声", "走", "体", "弟",
                "売", "麦", "来", "里", "画", "岩", "京", "国", "姉", "知",
                "長", "直", "店", "東", "歩", "妹", "明", "門", "夜", "科",
                "海", "活", "計", "後", "室", "首", "秋", "春", "食", "星",
                "前", "茶", "昼", "点", "南", "風", "思", "家", "夏", "記",
                "帰", "原", "高", "紙", "時", "弱", "書", "通", "馬", "魚",
                "教", "強", "黄", "黒", "細", "週", "雪", "船", "組", "鳥",
                "野", "理", "雲", "絵", "間", "場", "晴", "朝", "答", "道",
                "買", "番", "遠", "園", "楽", "新", "数", "電", "話", "歌",
                "語", "算", "読", "聞", "鳴", "線", "親", "頭", "顔", "曜"
            ];

            // --- SỐ NÉT (của mỗi Kanji) ---
            var strokeCounts = {
                "刀":2, "丸":3, "弓":3, "工":3, "才":3, "万":3, "引":4, "牛":4, "今":4, "元":4,
                "戸":4, "午":4, "公":4, "止":4, "少":4, "心":4, "切":4, "太":4, "内":4, "父":4,
                "分":4, "方":4, "毛":4, "友":4, "外":5, "兄":5, "古":5, "広":5, "矢":5, "市":5,
                "台":5, "冬":5, "半":5, "母":5, "北":5, "用":5, "羽":6, "会":6, "回":6, "交":6,
                "光":6, "考":6, "行":6, "合":6, "寺":6, "自":6, "色":6, "西":6, "多":6, "池":6,
                "地":6, "当":6, "同":6, "肉":6, "米":6, "毎":6, "何":7, "角":7, "汽":7, "近":7,
                "形":7, "言":7, "谷":7, "作":7, "社":7, "図":7, "声":7, "走":7, "体":7, "弟":7,
                "売":7, "麦":7, "来":7, "里":7, "画":8, "岩":8, "京":8, "国":8, "姉":8, "知":8,
                "長":8, "直":8, "店":8, "東":8, "歩":8, "妹":8, "明":8, "門":8, "夜":8, "科":9,
                "海":9, "活":9, "計":9, "後":9, "室":9, "首":9, "秋":9, "春":9, "食":9, "星":9,
                "前":9, "茶":9, "昼":9, "点":9, "南":9, "風":9, "思":9, "家":10, "夏":10, "記":10,
                "帰":10, "原":10, "高":10, "紙":10, "時":10, "弱":10, "書":10, "通":10, "馬":10, "魚":11,
                "教":11, "強":11, "黄":11, "黒":11, "細":11, "週":11, "雪":11, "船":11, "組":11, "鳥":11,
                "野":11, "理":11, "雲":12, "絵":12, "間":12, "場":12, "晴":12, "朝":12, "答":12, "道":12,
                "買":12, "番":12, "遠":13, "園":13, "楽":13, "新":13, "数":13, "電":13, "話":13, "歌":14,
                "語":14, "算":14, "読":14, "聞":14, "鳴":14, "線":15, "親":16, "頭":16, "顔":18, "曜":18
            };

            // --- CÁCH ĐỌC HIRAGANA (kunyomi ưu tiên, nếu không có thì dùng onyomi) ---
            var readings = {
                "刀":"かたな", "丸":"まる", "弓":"ゆみ", "工":"こう", "才":"さい",
                "万":"まん", "引":"ひく", "牛":"うし", "今":"いま", "元":"もと",
                "戸":"と", "午":"ご", "公":"こう", "止":"とめる", "少":"すこし",
                "心":"こころ", "切":"きる", "太":"ふとい", "内":"うち", "父":"ちち",
                "分":"わける", "方":"かた", "毛":"け", "友":"とも", "外":"そと",
                "兄":"あに", "古":"ふるい", "広":"ひろい", "矢":"や", "市":"いち",
                "台":"だい", "冬":"ふゆ", "半":"はんぶん", "母":"はは", "北":"きた",
                "用":"よう", "羽":"はね", "会":"あう", "回":"まわす", "交":"まじわる",
                "光":"ひかり", "考":"かんがえる", "行":"いく", "合":"あう", "寺":"てら",
                "自":"みずから", "色":"いろ", "西":"にし", "多":"おおい", "池":"いけ",
                "地":"ち", "当":"あたる", "同":"おなじ", "肉":"にく", "米":"こめ",
                "毎":"まい", "何":"なに", "角":"かど", "汽":"き", "近":"ちかい",
                "形":"かたち", "言":"いう", "谷":"たに", "作":"つくる", "社":"しゃ",
                "図":"ず", "声":"こえ", "走":"はしる", "体":"からだ", "弟":"おとうと",
                "売":"うる", "麦":"むぎ", "来":"くる", "里":"さと", "画":"かく",
                "岩":"いわ", "京":"きょう", "国":"くに", "姉":"あね", "知":"しる",
                "長":"ながい", "直":"なおす", "店":"みせ", "東":"ひがし", "歩":"あるく",
                "妹":"いもうと", "明":"あかるい", "門":"もん", "夜":"よる", "科":"か",
                "海":"うみ", "活":"かつ", "計":"はかる", "後":"あと", "室":"しつ",
                "首":"くび", "秋":"あき", "春":"はる", "食":"たべる", "星":"ほし",
                "前":"まえ", "茶":"ちゃ", "昼":"ひる", "点":"てん", "南":"みなみ",
                "風":"かぜ", "思":"おもう", "家":"いえ", "夏":"なつ", "記":"しるす",
                "帰":"かえる", "原":"はら", "高":"たかい", "紙":"かみ", "時":"とき",
                "弱":"よわい", "書":"かく", "通":"とおる", "馬":"うま", "魚":"さかな",
                "教":"おしえる", "強":"つよい", "黄":"きいろ", "黒":"くろ", "細":"ほそい",
                "週":"しゅう", "雪":"ゆき", "船":"ふね", "組":"くむ", "鳥":"とり",
                "野":"の", "理":"り", "雲":"くも", "絵":"え", "間":"あいだ",
                "場":"ば", "晴":"はれる", "朝":"あさ", "答":"こたえる", "道":"みち",
                "買":"かう", "番":"ばん", "遠":"とおい", "園":"その", "楽":"たのしい",
                "新":"あたらしい", "数":"かず", "電":"でん", "話":"はなす", "歌":"うた",
                "語":"かたる", "算":"さん", "読":"よむ", "聞":"きく", "鳴":"なく",
                "線":"せん", "親":"おや", "頭":"あたま", "顔":"かお", "曜":"よう"
            };

            // --- SẮP XẾP THEO SỐ NÉT TĂNG DẦN ---
            var kanjiData = rawKanjiList.slice();
            kanjiData.sort(function(a, b) {
                return (strokeCounts[a] || 99) - (strokeCounts[b] || 99);
            });

            // --- BIẾN TOÀN CỤC ---
            var canvas, ctx, gif, trace, title, home, learn;
            var drawing = false;
            var currentIndex = 0;

            function init() {
                home = document.getElementById('home-screen');
                learn = document.getElementById('learn-screen');
                canvas = document.getElementById('canvas');
                ctx = canvas.getContext('2d');
                gif = document.getElementById('kanji-gif');
                trace = document.getElementById('trace-text');
                title = document.getElementById('current-title');

                // Tạo lưới các thẻ Kanji (đã sắp xếp)
                var grid = document.getElementById('kanjiGrid');
                for (var i = 0; i < kanjiData.length; i++) {
                    var k = kanjiData[i];
                    var div = document.createElement('div');
                    div.className = 'card-kanji';
                    div.innerText = k;
                    div.onclick = (function(kanji) {
                        return function() { startLearn(kanji); };
                    })(k);
                    grid.appendChild(div);
                }

                // Sự kiện vẽ
                canvas.addEventListener('mousedown', startDrawing);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDrawing);
                canvas.addEventListener('mouseleave', stopDrawing);
                canvas.addEventListener('touchstart', startDrawing, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', stopDrawing);
                canvas.addEventListener('touchcancel', stopDrawing);

                window.addEventListener('resize', function() {
                    requestAnimationFrame(resizeCanvas);
                });
                window.addEventListener('orientationchange', function() {
                    setTimeout(function() { requestAnimationFrame(resizeCanvas); }, 100);
                });
            }

            // Cập nhật màn hình học với kanji k
            function updateLearnScreen(k) {
                var reading = readings[k] || '';
                title.innerText = k + (reading ? ' (' + reading + ')' : '');
                trace.innerText = k;
                gif.src = k + '-order.gif';
                gif.style.display = '';
                clearBoard();
                requestAnimationFrame(function() {
                    setTimeout(resizeCanvas, 50);
                });
            }

            // Bắt đầu học một kanji từ grid
            function startLearn(k) {
                home.style.display = 'none';
                learn.style.display = 'flex';
                currentIndex = kanjiData.indexOf(k);
                if (currentIndex === -1) currentIndex = 0;
                updateLearnScreen(k);
            }

            window.prevKanji = function() {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateLearnScreen(kanjiData[currentIndex]);
                }
            };

            window.nextKanji = function() {
                if (currentIndex < kanjiData.length - 1) {
                    currentIndex++;
                    updateLearnScreen(kanjiData[currentIndex]);
                }
            };

            window.goHome = function() {
                home.style.display = 'flex';
                learn.style.display = 'none';
                gif.src = '';
            };

            window.clearBoard = function() {
                if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
            };

            function resizeCanvas() {
                if (!canvas || !canvas.parentElement) return;
                var container = canvas.parentElement;
                var w = container.clientWidth;
                var h = container.clientHeight;
                canvas.width = w;
                canvas.height = h;
                clearBoard();
            }

            function getPos(e) {
                var rect = canvas.getBoundingClientRect();
                var scaleX = canvas.width / rect.width;
                var scaleY = canvas.height / rect.height;
                var clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                var x = (clientX - rect.left) * scaleX;
                var y = (clientY - rect.top) * scaleY;
                x = Math.min(Math.max(x, 0), canvas.width);
                y = Math.min(Math.max(y, 0), canvas.height);
                return { x: x, y: y };
            }

            function startDrawing(e) {
                if (e.preventDefault) e.preventDefault();
                drawing = true;
                ctx.beginPath();
                draw(e);
            }

            function stopDrawing() {
                drawing = false;
                ctx.beginPath();
            }

            function draw(e) {
                if (!drawing) return;
                if (e.preventDefault) e.preventDefault();
                var p = getPos(e);
                ctx.lineWidth = Math.max(8, canvas.width / 40);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#2d3436';
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
            }

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>
</html>
