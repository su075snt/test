<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>数え方 · 日本語</title>
    <!-- システムフォントのみ使用 (iOS 最適化) -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f4f9fb;
            --surface: #ffffff;
            --primary: #0288d1;
            --text: #1e2b3c;
            --text-light: #5c6f87;
            --accent: #ff6f61;
            --border-radius: 24px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.4;
            padding: 12px 10px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* サイドメニュー */
        .menu-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(3px);
            z-index: 1999;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        .menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        #menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: -8px 0 30px rgba(0,0,0,0.15);
            transition: 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            z-index: 2000;
            padding: 32px 24px;
            overflow-y: auto;
            border-radius: 30px 0 0 30px;
        }
        #menu.active { right: 0; }

        .menu-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 2001;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 14px rgba(2,136,209,0.3);
            cursor: pointer;
            backdrop-filter: blur(4px);
            background: rgba(2,136,209,0.95);
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--primary);
        }

        .mode-box {
            background: #f0f7fc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 28px;
        }
        .mode-box label { font-weight: 500; color: var(--text); }

        .setting-group {
            margin-bottom: 22px;
        }
        .setting-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-light);
        }
        select, input[type="range"], input[type="color"] {
            width: 100%;
            padding: 10px;
            border-radius: 16px;
            border: 1.5px solid #dde5ed;
            background: white;
            font-size: 1rem;
        }
        input[type="color"] { height: 50px; }

        /* タブエリア */
        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 70px;
            margin-bottom: 8px;
            max-width: 700px;
        }

        .tab-btn {
            background: var(--surface);
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 2px solid transparent;
            transition: 0.2s;
            cursor: pointer;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: white;
            box-shadow: 0 8px 18px rgba(2,136,209,0.25);
        }

        #categoryTitle {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--primary);
            margin: 12px 0 8px;
            text-align: center;
        }

        /* カードグリッド */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 900px;
            margin: 10px auto;
        }

        .card {
            background: var(--surface);
            padding: 16px 4px 12px;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,20,30,0.08);
            border: 3px solid transparent;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card.active {
            border-color: var(--accent);
            transform: scale(1.02);
            background: #fff9f5;
        }

        .main-text {
            font-size: 2rem;
            font-weight: 700;
            color: #1e2b3c;
            line-height: 1.2;
        }
        .reading {
            color: #d32f2f;
            font-size: 1rem;
            font-weight: 500;
            visibility: hidden;
            height: 1.3rem;
            margin-top: 4px;
        }
        .viet {
            color: #2e7d73;
            font-size: 0.9rem;
            font-weight: 500;
            visibility: hidden;
            border-top: 1px dashed #cbd5e0;
            margin-top: 8px;
            padding-top: 6px;
            width: 90%;
        }
        .card.active .reading { visibility: visible; }
        .card.active .viet.show { visibility: visible; }

        /* 疑問詞カード */
        .q-area {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .q-card {
            width: 260px;
            background: #ddeeff;
            border-radius: 36px;
            padding: 18px 10px;
            border: 3px solid var(--primary);
        }
        .q-card .main-text { font-size: 1.7rem; color: #01579b; }

        @media (max-width: 700px) {
            .grid-container { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 450px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
            .tab-btn { font-size: 1.1rem; padding: 8px 12px; }
            #categoryTitle { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <!-- オーバーレイ (メニュー用) -->
    <div class="menu-overlay" id="overlay" onclick="closeMenu()"></div>

    <button class="menu-btn" id="menuToggle">設定 ⚙️</button>

    <div id="menu">
        <h3>学習設定</h3>
        <div class="mode-box">
            <div style="margin-bottom: 12px;"><b>音声モード</b></div>
            <label><input type="radio" name="mode" id="jpOnly" checked> 日本語のみ</label><br>
            <label><input type="radio" name="mode" id="jpVi"> 日本語 + ベトナム語</label>
        </div>
        <div class="setting-group">
            <label>背景色</label>
            <input type="color" id="bgCol" value="#f4f9fb" oninput="updateUI()">
        </div>
        <div class="setting-group">
            <label>文字色</label>
            <input type="color" id="textCol" value="#1e2b3c" oninput="updateUI()">
        </div>
        <div class="setting-group">
            <label>再生速度</label>
            <input type="range" id="speed" min="0.5" max="1.5" step="0.1" value="1">
        </div>
        <div class="setting-group">
            <label>日本語の声</label>
            <select id="vJp"></select>
        </div>
        <div class="setting-group">
            <label>ベトナム語の声</label>
            <select id="vVi"></select>
        </div>
        <p style="font-size:0.8rem; color:#78909c; text-align:center; margin-top:30px;">🇻🇳 日本語数え方 — iOS対応版</p>
    </div>

    <div class="tabs-container" id="tabs"></div>
    <h2 id="categoryTitle"></h2>
    <div class="grid-container" id="cardGrid"></div>
    <div class="q-area" id="questionArea"></div>

    <script>
        (function() {
            // 音声合成の初期化 (iOSではユーザー操作が必要な場合もあるが、onclickで発声するので問題ない)
            const synth = window.speechSynthesis;

            // ------ カウンターデータ (16種) ------
            const counters = {
                "tsu": { title: "物 (cái chung)", icon: "📦", query: "いくつですか？", qRead: "いくつ ですか？", qVi: "Mấy cái?", 
                    items: [
                        {k:'一つ', r:'ひとつ', v:'1 cái'}, {k:'二つ', r:'ふたつ', v:'2 cái'}, {k:'三つ', r:'みっつ', v:'3 cái'},
                        {k:'四つ', r:'よっつ', v:'4 cái'}, {k:'五つ', r:'いつつ', v:'5 cái'}, {k:'六つ', r:'むっつ', v:'6 cái'},
                        {k:'七つ', r:'ななつ', v:'7 cái'}, {k:'八つ', r:'やっつ', v:'8 cái'}, {k:'九つ', r:'ここのつ', v:'9 cái'}, {k:'十', r:'とお', v:'10 cái'}
                    ]
                },
                "nin": { title: "人 (người)", icon: "👤", query: "何人ですか？", qRead: "なんにん ですか？", qVi: "Mấy người?", 
                    items: [
                        {k:'一人', r:'ひとり', v:'1 người'}, {k:'二人', r:'ふたり', v:'2 người'}, {k:'三人', r:'さんにん', v:'3 người'},
                        {k:'四人', r:'よにん', v:'4 người'}, {k:'五人', r:'ごにん', v:'5 người'}, {k:'六人', r:'ろくにん', v:'6 người'},
                        {k:'七人', r:'ななにん', v:'7 người'}, {k:'八人', r:'はちにん', v:'8 người'}, {k:'九人', r:'きゅうにん', v:'9 người'}, {k:'十人', r:'じゅうにん', v:'10 người'}
                    ]
                },
                "dai": { title: "台 (máy móc)", icon: "🚗", query: "何台ですか？", qRead: "なんだい ですか？", qVi: "Mấy chiếc?", 
                    items: [
                        {k:'一台', r:'いちだい', v:'1 chiếc'}, {k:'二台', r:'にだい', v:'2 chiếc'}, {k:'三台', r:'さんだい', v:'3 chiếc'},
                        {k:'四台', r:'よんだい', v:'4 chiếc'}, {k:'五台', r:'ごだい', v:'5 chiếc'}, {k:'六台', r:'ろくだい', v:'6 chiếc'},
                        {k:'七台', r:'ななだい', v:'7 chiếc'}, {k:'八台', r:'はちだい', v:'8 chiếc'}, {k:'九台', r:'きゅうだい', v:'9 chiếc'}, {k:'十台', r:'じゅうだい', v:'10 chiếc'}
                    ]
                },
                "mai": { title: "枚 (tờ mỏng)", icon: "📄", query: "何枚ですか？", qRead: "なんまい ですか", qVi: "Mấy tờ?", 
                    items: Array.from({length:10}, (_, i) => ({k:(i+1)+'枚', r:['いち','に','さん','よん','ご','ろく','なな','はち','きゅう','じゅう'][i]+'まい', v:(i+1)+' tờ'}))
                },
                "hon": { title: "本 (vật dài)", icon: "🥢", query: "何本ですか？", qRead: "なんぼん ですか？", qVi: "Mấy cây?", 
                    items: [
                        {k:'一本', r:'いっぽん', v:'1 cây'}, {k:'二本', r:'にほん', v:'2 cây'}, {k:'三本', r:'さんぼん', v:'3 cây'},
                        {k:'四本', r:'よんほん', v:'4 cây'}, {k:'五本', r:'ごほん', v:'5 cây'}, {k:'六本', r:'ろっぽん', v:'6 cây'},
                        {k:'七本', r:'ななほん', v:'7 cây'}, {k:'八本', r:'はっぽん', v:'8 cây'}, {k:'九本', r:'きゅうほん', v:'9 cây'}, {k:'十本', r:'じゅっぽん', v:'10 cây'}
                    ]
                },
                "ko": { title: "個 (vật nhỏ)", icon: "⚽", query: "何個ですか？", qRead: "なんこ ですか？", qVi: "Mấy quả/cái?", 
                    items: [
                        {k:'一個', r:'いっこ', v:'1 cái'}, {k:'二個', r:'にこ', v:'2 cái'}, {k:'三個', r:'さんこ', v:'3 cái'},
                        {k:'四個', r:'よんこ', v:'4 cái'}, {k:'五個', r:'ごこ', v:'5 cái'}, {k:'六個', r:'ろっこ', v:'6 cái'},
                        {k:'七個', r:'ななこ', v:'7 cái'}, {k:'八個', r:'はっこ', v:'8 cái'}, {k:'九個', r:'きゅうこ', v:'9 cái'}, {k:'十個', r:'じゅっこ', v:'10 cái'}
                    ]
                },
                "satsu": { title: "冊 (sách)", icon: "📚", query: "何冊ですか？", qRead: "なんさつ ですか？", qVi: "Mấy cuốn?", 
                    items: [
                        {k:'一冊', r:'いっさつ', v:'1 cuốn'}, {k:'二冊', r:'にさつ', v:'2 cuốn'}, {k:'三冊', r:'さんさつ', v:'3 cuốn'},
                        {k:'四冊', r:'よんさつ', v:'4 cuốn'}, {k:'五冊', r:'ごさつ', v:'5 cuốn'}, {k:'六冊', r:'ろくさつ', v:'6 cuốn'},
                        {k:'七冊', r:'ななさつ', v:'7 cuốn'}, {k:'八冊', r:'はっさつ', v:'8 cuốn'}, {k:'九冊', r:'きゅうさつ', v:'9 cuốn'}, {k:'十冊', r:'じゅっさつ', v:'10 cuốn'}
                    ]
                },
                "hiki": { title: "匹 (thú nhỏ)", icon: "🐱", query: "何匹ですか？", qRead: "なんびき ですか？", qVi: "Mấy con?", 
                    items: [
                        {k:'一匹', r:'いっぴき', v:'1 con'}, {k:'二匹', r:'にひき', v:'2 con'}, {k:'三匹', r:'さんびき', v:'3 con'},
                        {k:'四匹', r:'よんひき', v:'4 con'}, {k:'五匹', r:'ごひき', v:'5 con'}, {k:'六匹', r:'ろっぴき', v:'6 con'},
                        {k:'七匹', r:'ななひき', v:'7 con'}, {k:'八匹', r:'はっぴき', v:'8 con'}, {k:'九匹', r:'きゅうひき', v:'9 con'}, {k:'十匹', r:'じゅっぴき', v:'10 con'}
                    ]
                },
                "kai": { title: "階 (tầng)", icon: "🏢", query: "何階ですか？", qRead: "なんがい ですか？", qVi: "Tầng mấy?", 
                    items: [
                        {k:'一階', r:'いっかい', v:'Tầng 1'}, {k:'二階', r:'にかい', v:'Tầng 2'}, {k:'三階', r:'さんがい', v:'Tầng 3'},
                        {k:'四階', r:'よんかい', v:'Tầng 4'}, {k:'五階', r:'ごかい', v:'Tầng 5'}, {k:'六階', r:'ろっかい', v:'Tầng 6'},
                        {k:'七階', r:'ななかい', v:'Tầng 7'}, {k:'八階', r:'はっかい', v:'Tầng 8'}, {k:'九階', r:'きゅうかい', v:'Tầng 9'}, {k:'十階', r:'じゅっかい', v:'Tầng 10'}
                    ]
                },
                "jikan": { title: "時 (giờ)", icon: "⏰", query: "何時ですか？", qRead: "なんじ ですか？", qVi: "Mấy giờ?", 
                    items: Array.from({length:10}, (_, i) => ({k:(i+1)+'時', r:['いち','に','さん','よ','ご','ろく','しち','はち','く','じゅう'][i]+'じ', v:(i+1)+' giờ'}))
                },
                "fun": { title: "分 (phút)", icon: "⏲️", query: "何分ですか？", qRead: "なんぷん ですか？", qVi: "Mấy phút?", 
                    items: [
                        {k:'一分', r:'いっぷん', v:'1 phút'}, {k:'二分', r:'にふん', v:'2 phút'}, {k:'三分', r:'さんぷん', v:'3 phút'},
                        {k:'四分', r:'よんぷん', v:'4 phút'}, {k:'五分', r:'ごふん', v:'5 phút'}, {k:'六分', r:'ろっぷん', v:'6 phút'},
                        {k:'七分', r:'ななふん', v:'7 phút'}, {k:'八分', r:'はっぷん', v:'8 phút'}, {k:'九分', r:'きゅうふん', v:'9 phút'}, {k:'十分', r:'じゅっぷん', v:'10 phút'}
                    ]
                },
                "sai": { title: "歳 (tuổi)", icon: "🎂", query: "何歳ですか？", qRead: "なんさい ですか？", qVi: "Mấy tuổi?", 
                    items: [
                        {k:'一歳', r:'いっさい', v:'1 tuổi'}, {k:'二歳', r:'にさい', v:'2 tuổi'}, {k:'三歳', r:'さんさい', v:'3 tuổi'},
                        {k:'四歳', r:'よんさい', v:'4 tuổi'}, {k:'五歳', r:'ごさい', v:'5 tuổi'}, {k:'六歳', r:'ろくさい', v:'6 tuổi'},
                        {k:'七歳', r:'ななさい', v:'7 tuổi'}, {k:'八歳', r:'はっさい', v:'8 tuổi'}, {k:'九歳', r:'きゅうさい', v:'9 tuổi'}, {k:'十歳', r:'じゅっさい', v:'10 tuổi'}
                    ]
                },
                "hai": { title: "杯 (ly)", icon: "🥛", query: "何杯ですか？", qRead: "なんばい ですか？", qVi: "Mấy ly?", 
                    items: [
                        {k:'一杯', r:'いっぱい', v:'1 ly'}, {k:'二杯', r:'にはい', v:'2 ly'}, {k:'三杯', r:'さんばい', v:'3 ly'},
                        {k:'四杯', r:'よんはい', v:'4 ly'}, {k:'五杯', r:'ごはい', v:'5 ly'}, {k:'六杯', r:'ろっぱい', v:'6 ly'},
                        {k:'七杯', r:'ななはい', v:'7 ly'}, {k:'八杯', r:'はっぱい', v:'8 ly'}, {k:'九杯', r:'きゅうはい', v:'9 ly'}, {k:'十杯', r:'じゅっぱい', v:'10 ly'}
                    ]
                },
                "soku": { title: "足 (đôi)", icon: "👟", query: "何足ですか？", qRead: "なんぞく ですか？", qVi: "Mấy đôi?", 
                    items: [
                        {k:'一足', r:'いっそく', v:'1 đôi'}, {k:'二足', r:'にそく', v:'2 đôi'}, {k:'三足', r:'さんぞく', v:'3 đôi'},
                        {k:'四足', r:'よんそく', v:'4 đôi'}, {k:'五足', r:'ごそく', v:'5 đôi'}, {k:'六足', r:'ろっそく', v:'6 đôi'},
                        {k:'七足', r:'ななそく', v:'7 đôi'}, {k:'八足', r:'はっそく', v:'8 đôi'}, {k:'九足', r:'きゅうそく', v:'9 đôi'}, {k:'十足', r:'じゅっそく', v:'10 đôi'}
                    ]
                },
                "ken": { title: "軒 (nhà)", icon: "🏠", query: "何軒ですか？", qRead: "なんげん ですか？", qVi: "Mấy căn?", 
                    items: [
                        {k:'一軒', r:'いっけん', v:'1 căn'}, {k:'二軒', r:'にけん', v:'2 căn'}, {k:'三軒', r:'さんげん', v:'3 căn'},
                        {k:'四軒', r:'よんけん', v:'4 căn'}, {k:'五軒', r:'ごけん', v:'5 căn'}, {k:'六軒', r:'ろっけん', v:'6 căn'},
                        {k:'七軒', r:'ななけん', v:'7 căn'}, {k:'八軒', r:'はっけん', v:'8 căn'}, {k:'九軒', r:'きゅうけん', v:'9 căn'}, {k:'十軒', r:'じゅっけん', v:'10 căn'}
                    ]
                },
                "chaku": { title: "着 (bộ áo)", icon: "👔", query: "何着ですか？", qRead: "なんちゃく ですか？", qVi: "Mấy bộ?", 
                    items: Array.from({length:10}, (_, i) => ({k:(i+1)+'着', r:['いっちゃく','にちゃく','さんちゃく','よんちゃく','ごちゃく','ろくちゃく','ななちゃく','はっちゃく','きゅうちゃく','じゅっちゃく'][i], v:(i+1)+' bộ'}))
                }
            };

            // ----- DOM 要素 -----
            const tabsContainer = document.getElementById('tabs');
            const grid = document.getElementById('cardGrid');
            const qArea = document.getElementById('questionArea');
            const menu = document.getElementById('menu');
            const overlay = document.getElementById('overlay');
            const menuToggle = document.getElementById('menuToggle');

            menuToggle.addEventListener('click', () => {
                menu.classList.add('active');
                overlay.classList.add('active');
            });
            window.closeMenu = function() {
                menu.classList.remove('active');
                overlay.classList.remove('active');
            };

            // ----- タブ生成 -----
            const keys = Object.keys(counters);
            keys.forEach((key, idx) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
                // タブに表示する短縮名 (最初の漢字1文字＋必要なら)
                let shortName = counters[key].title.split(' ')[0];
                btn.innerText = shortName;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderContent(key);
                };
                tabsContainer.appendChild(btn);
            });

            // ----- 画面描画 -----
            function renderContent(key) {
                const data = counters[key];
                document.getElementById('categoryTitle').innerText = data.title;
                grid.innerHTML = '';

                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    // アイコン表示なし
                    card.innerHTML = `
                        <div class="main-text">${item.k}</div>
                        <div class="reading">${item.r}</div>
                        <div class="viet">${item.v}</div>
                    `;
                    card.onclick = () => playCard(card, item.r, item.v);
                    grid.appendChild(card);
                });

                // 疑問詞カード
                qArea.innerHTML = `
                    <p style="color: var(--text-light); margin-bottom: 6px;">❓ 疑問詞</p>
                    <div class="card q-card" onclick="playCard(this, '${data.qRead}', '${data.qVi}')">
                        <div class="main-text" style="font-size:1.7rem">${data.query}</div>
                        <div class="reading">${data.qRead}</div>
                        <div class="viet">${data.qVi}</div>
                    </div>
                `;
            }

            // ----- 再生処理 (iOSで確実に声を出す) -----
            window.playCard = function(el, jpText, viText) {
                // 以前の再生を止める
                synth.cancel();

                const isViMode = document.getElementById('jpVi').checked;
                // アクティブなカードをリセット
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                document.querySelectorAll('.viet').forEach(v => v.classList.remove('show'));
                el.classList.add('active');
                if (isViMode) {
                    const vietEl = el.querySelector('.viet');
                    if (vietEl) vietEl.classList.add('show');
                }

                const speed = parseFloat(document.getElementById('speed').value);
                const jpVoiceName = document.getElementById('vJp').value;
                const viVoiceName = document.getElementById('vVi').value;

                // 日本語発声
                const utterJp = new SpeechSynthesisUtterance(jpText);
                utterJp.rate = speed;
                // 選択された声を割り当て (Kyoko優先の選択は既にデフォルトで設定済み)
                const selectedJp = voices.find(v => v.name === jpVoiceName);
                if (selectedJp) utterJp.voice = selectedJp;

                if (isViMode) {
                    utterJp.onend = () => {
                        const utterVi = new SpeechSynthesisUtterance(viText);
                        utterVi.rate = speed;
                        const selectedVi = voices.find(v => v.name === viVoiceName);
                        if (selectedVi) utterVi.voice = selectedVi;
                        synth.speak(utterVi);
                    };
                }
                synth.speak(utterJp);
            };

            // ----- 音声一覧取得 & Kyoko優先設定 -----
            let voices = [];
            function loadVoices() {
                voices = synth.getVoices();
                const selJp = document.getElementById('vJp');
                const selVi = document.getElementById('vVi');
                selJp.innerHTML = '';
                selVi.innerHTML = '';

                // 日本語リスト
                voices.forEach(v => {
                    if (v.lang.startsWith('ja')) {
                        const opt = document.createElement('option');
                        opt.value = v.name;
                        opt.textContent = v.name + (v.default ? ' (default)' : '');
                        selJp.appendChild(opt);
                    }
                });
                // ベトナム語リスト
                voices.forEach(v => {
                    if (v.lang.startsWith('vi')) {
                        const opt = document.createElement('option');
                        opt.value = v.name;
                        opt.textContent = v.name;
                        selVi.appendChild(opt);
                    }
                });

                // ★ Kyoko 優先設定 (iOS標準の日本語美声)
                if (selJp.options.length > 0) {
                    // "Kyoko" を含むものを探す (日本語)
                    let kyokoOpt = Array.from(selJp.options).find(opt => opt.text.includes('Kyoko') || opt.text.includes('きょうこ'));
                    if (kyokoOpt) {
                        kyokoOpt.selected = true;
                    } else {
                        selJp.options[0].selected = true;  // 最初の選択肢
                    }
                }
                // ベトナム語は最初を選択
                if (selVi.options.length > 0) selVi.options[0].selected = true;
            }

            // iOS では voiceschanged が遅れることがあるので、初回ロードと遅延実行
            if (synth.onvoiceschanged !== undefined) {
                synth.onvoiceschanged = loadVoices;
            }
            // 即時呼び出し (一部ブラウザ用)
            if (synth.getVoices().length) {
                loadVoices();
            } else {
                setTimeout(() => {
                    if (synth.getVoices().length) loadVoices();
                }, 150);
            }

            // ----- テーマ変更 (色) -----
            window.updateUI = function() {
                document.documentElement.style.setProperty('--bg', document.getElementById('bgCol').value);
                document.documentElement.style.setProperty('--text', document.getElementById('textCol').value);
            };

            // 初期表示
            renderContent('tsu');
        })();
    </script>
</body>
</html>
